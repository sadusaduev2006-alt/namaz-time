<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Намаз Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #E0E0E0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .prayer-card {
            background: #2C2C2C;
            border-radius: 48px;
            padding: 24px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .icon-btn {
            background: #3D3D3D;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            cursor: pointer;
            color: #D4A373;
            font-size: 20px;
        }
        .location-badge {
            background: #3D3D3D;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .location-badge select {
            background: transparent;
            border: none;
            color: #D4A373;
            font-size: 14px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
            color: #D4A373;
        }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #383838;
            border-radius: 28px;
            margin-bottom: 10px;
        }
        .prayer-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .prayer-time {
            font-weight: 700;
            font-size: 18px;
        }
        .footer-note {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #3D3D3D;
        }
        .floating-compass-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            background: #D4A373;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        .floating-quran-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #D4A373;
            color: white;
            padding: 12px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
        }
        /* ПРОФИЛЬ */
        .fullscreen-profile {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #2C2C2C;
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .fullscreen-profile.show {
            display: flex;
        }
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #3D3D3D;
            margin-bottom: 20px;
        }
        .close-profile {
            background: none;
            border: none;
            font-size: 28px;
            color: #D4A373;
            cursor: pointer;
        }
        .profile-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #3D3D3D;
            padding-bottom: 12px;
        }
        .profile-tab {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            color: #A0A0A0;
            transition: all 0.2s;
        }
        .profile-tab.active {
            background: #D4A373;
            color: white;
        }
        .profile-pane {
            display: none;
        }
        .profile-pane.active {
            display: block;
        }
        /* АККАУНТ */
        .account-avatar {
            text-align: center;
            margin-bottom: 20px;
        }
        .account-avatar i {
            font-size: 80px;
            color: #D4A373;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .auth-tab-btn {
            flex: 1;
            background: #3D3D3D;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            color: #E0E0E0;
            transition: all 0.2s;
        }
        .auth-tab-btn.active {
            background: #D4A373;
            color: white;
        }
        .auth-input {
            width: 100%;
            padding: 14px;
            background: #3D3D3D;
            border: none;
            border-radius: 40px;
            margin-bottom: 12px;
            color: white;
            font-size: 14px;
        }
        .profile-auth-btn {
            width: 100%;
            padding: 14px;
            background: #D4A373;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .profile-user-info {
            background: #3D3D3D;
            padding: 16px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 10px;
        }
        .profile-logout-btn {
            background: #e74c3c;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        /* НАСТРОЙКИ */
        .settings-item {
            background: #3D3D3D;
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        input:checked + .slider {
            background-color: #D4A373;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .settings-select {
            background: #2C2C2C;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="prayer-card">
            <div class="header-top">
                <button id="profileBtn" class="icon-btn"><i class="fas fa-user-circle"></i></button>
                <div class="location-badge">
                    <i class="fas fa-map-marker-alt"></i>
                    <select id="citySelect"><option>Махачкала</option></select>
                </div>
                <button id="menuToggle" class="icon-btn"><i class="fas fa-ellipsis-h"></i></button>
            </div>
            <h1>🕌 Время намаза</h1>
            <div class="prayer-grid">
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-cloud-moon"></i><span>Фаджр</span></div><span class="prayer-time" id="fajr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-sun"></i><span>Шурук</span></div><span class="prayer-time" id="sunrise">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-sun"></i><span>Зухр</span></div><span class="prayer-time" id="dhuhr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-clock"></i><span>Аср</span></div><span class="prayer-time" id="asr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-moon"></i><span>Магриб</span></div><span class="prayer-time" id="maghrib">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-star-of-life"></i><span>Иша</span></div><span class="prayer-time" id="isha">--:--</span></div>
            </div>
            <div class="footer-note"><i class="far fa-clock"></i> Обновлено: <span id="updateTime">--:--</span></div>
        </div>
    </div>

    <button id="floatingCompassBtn" class="floating-compass-btn"><i class="fas fa-compass"></i></button>
    <a href="quran.html" id="floatingQuranBtn" class="floating-quran-btn">📖 Коран</a>

    <!-- ПРОФИЛЬ -->
    <div id="fullscreenProfile" class="fullscreen-profile">
        <div class="profile-header">
            <h2>Настройки</h2>
            <button id="closeProfile" class="close-profile">&times;</button>
        </div>
        <div class="profile-tabs">
            <button class="profile-tab active" data-tab="account">👤 Аккаунт</button>
            <button class="profile-tab" data-tab="notifications">🔔 Уведомления</button>
            <button class="profile-tab" data-tab="appearance">🎨 Оформление</button>
        </div>

        <!-- АККАУНТ -->
        <div id="tab-account" class="profile-pane active">
            <div class="account-avatar"><i class="fas fa-user-circle"></i></div>
            <div id="authForms">
                <div class="auth-tabs">
                    <button id="showLoginTab" class="auth-tab-btn active">Вход</button>
                    <button id="showRegisterTab" class="auth-tab-btn">Регистрация</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
                    <input type="password" id="loginPassword" placeholder="Пароль" class="auth-input">
                    <button id="loginBtn" class="profile-auth-btn">Войти</button>
                </div>
                <div id="registerForm" style="display:none">
                    <input type="text" id="registerName" placeholder="Имя" class="auth-input">
                    <input type="email" id="registerEmail" placeholder="Email" class="auth-input">
                    <input type="password" id="registerPassword" placeholder="Пароль" class="auth-input">
                    <input type="password" id="registerConfirmPassword" placeholder="Повторите пароль" class="auth-input">
                    <button id="registerBtn" class="profile-auth-btn">Зарегистрироваться</button>
                </div>
            </div>
            <div id="userProfileBlock" style="display:none">
                <div class="profile-user-info">
                    <p><strong id="userName"></strong></p>
                    <p id="userEmail"></p>
                </div>
                <button id="profileSignOutBtn" class="profile-logout-btn">Выйти</button>
            </div>
        </div>

        <!-- УВЕДОМЛЕНИЯ -->
        <div id="tab-notifications" class="profile-pane">
            <div class="settings-item">
                <span>🔔 Уведомления о намазах</span>
                <label class="switch"><input type="checkbox" id="notificationsToggle"><span class="slider"></span></label>
            </div>
            <div class="settings-item">
                <span>⏰ Напоминать за</span>
                <select id="notificationTimeSelect" class="settings-select">
                    <option value="5">5 минут</option>
                    <option value="10">10 минут</option>
                    <option value="15">15 минут</option>
                    <option value="30">30 минут</option>
                </select>
            </div>
        </div>

        <!-- ОФОРМЛЕНИЕ -->
        <div id="tab-appearance" class="profile-pane">
            <div class="settings-item">
                <span>🌙 Тёмная тема</span>
                <label class="switch"><input type="checkbox" id="profileDarkModeToggle" checked><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <script>
        // ========== ВРЕМЯ НАМАЗА ==========
        const times = { fajr: "02:07", sunrise: "04:14", dhuhr: "11:51", asr: "15:51", maghrib: "19:24", isha: "21:06" };
        document.getElementById('fajr').innerText = times.fajr;
        document.getElementById('sunrise').innerText = times.sunrise;
        document.getElementById('dhuhr').innerText = times.dhuhr;
        document.getElementById('asr').innerText = times.asr;
        document.getElementById('maghrib').innerText = times.maghrib;
        document.getElementById('isha').innerText = times.isha;
        document.getElementById('updateTime').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

        // ========== ПРОФИЛЬ ==========
        const profileBtn = document.getElementById('profileBtn');
        const profileModal = document.getElementById('fullscreenProfile');
        const closeProfile = document.getElementById('closeProfile');
        profileBtn.onclick = () => profileModal.classList.add('show');
        closeProfile.onclick = () => profileModal.classList.remove('show');

        // ========== ВКЛАДКИ ПРОФИЛЯ ==========
        const tabs = document.querySelectorAll('.profile-tab');
        const panes = document.querySelectorAll('.profile-pane');
        
        tabs.forEach(tab => {
            tab.onclick = () => {
                const tabId = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                panes.forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`tab-${tabId}`).classList.add('active');
            };
        });

        // ========== ПЕРЕКЛЮЧЕНИЕ ВХОД/РЕГИСТРАЦИЯ ==========
        const showLogin = document.getElementById('showLoginTab');
        const showRegister = document.getElementById('showRegisterTab');
        const loginDiv = document.getElementById('loginForm');
        const registerDiv = document.getElementById('registerForm');
        
        showLogin.onclick = () => {
            showLogin.classList.add('active');
            showRegister.classList.remove('active');
            loginDiv.style.display = 'block';
            registerDiv.style.display = 'none';
        };
        showRegister.onclick = () => {
            showRegister.classList.add('active');
            showLogin.classList.remove('active');
            registerDiv.style.display = 'block';
            loginDiv.style.display = 'none';
        };

        // ========== ТЁМНАЯ ТЕМА ==========
        const darkToggle = document.getElementById('profileDarkModeToggle');
        darkToggle.onchange = (e) => {
            document.body.style.background = e.target.checked ? '#1a1a1a' : '#F4EFE6';
            document.body.style.color = e.target.checked ? '#E0E0E0' : '#2C2A29';
        };

        // ========== ДЕМО-ВХОД ==========
        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                alert('Введите email');
                return;
            }
            document.getElementById('authForms').style.display = 'none';
            document.getElementById('userProfileBlock').style.display = 'block';
            document.getElementById('userName').innerText = email.split('@')[0];
            document.getElementById('userEmail').innerText = email;
            alert('Добро пожаловать! (демо-режим)');
        };
        
        document.getElementById('registerBtn').onclick = () => {
            const email = document.getElementById('registerEmail').value;
            if (!email) {
                alert('Введите email');
                return;
            }
            document.getElementById('authForms').style.display = 'none';
            document.getElementById('userProfileBlock').style.display = 'block';
            document.getElementById('userName').innerText = document.getElementById('registerName').value || email.split('@')[0];
            document.getElementById('userEmail').innerText = email;
            alert('Регистрация выполнена! (демо-режим)');
        };
        
        document.getElementById('profileSignOutBtn').onclick = () => {
            document.getElementById('authForms').style.display = 'block';
            document.getElementById('userProfileBlock').style.display = 'none';
            alert('Вы вышли из аккаунта');
        };
    </script>
</body>
</html>
