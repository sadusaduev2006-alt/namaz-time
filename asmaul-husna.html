<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>99 имён Аллаха — Намаз Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .asma-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .asma-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .back-btn {
            background: var(--accent-light);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            cursor: pointer;
            color: var(--accent);
            font-size: 20px;
            transition: transform 0.2s;
        }
        .back-btn:hover {
            transform: scale(1.05);
        }
        .asma-header h1 {
            font-size: 24px;
            margin: 0;
            background: none;
            -webkit-text-fill-color: var(--accent);
        }
        .asma-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .asma-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }
        .asma-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }
        .asma-card.active {
            background: var(--active-bg);
            border-color: var(--active-border);
        }
        .asma-number {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .asma-arabic {
            font-family: 'Amiri', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .asma-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .asma-meaning {
            font-size: 12px;
            opacity: 0.7;
        }
        .asma-detail {
            margin-top: 24px;
            background: var(--accent-light);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
        }
        .detail-arabic {
            font-family: 'Amiri', serif;
            font-size: 42px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .detail-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .detail-meaning {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 16px;
        }
        .detail-description {
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
        }
        .search-box-asma {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        .search-box-asma input {
            flex: 1;
            background: var(--accent-light);
            border: none;
            padding: 14px 18px;
            border-radius: 40px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-primary);
        }
        .search-box-asma input:focus {
            outline: none;
        }
        .counter {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--accent);
        }
        @media (max-width: 560px) {
            .asma-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .detail-arabic {
                font-size: 32px;
            }
        }
    </style>
</head>
<body data-theme="light">
    <div class="asma-container">
        <div class="asma-header">
            <button onclick="window.location.href='index.html'" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>📿 99 имён Аллаха</h1>
            <button id="themeToggleAsma" class="back-btn" style="margin-left: auto;">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="search-box-asma">
            <i class="fas fa-search" style="align-self:center; color: var(--accent);"></i>
            <input type="text" id="asmaSearch" placeholder="Поиск по имени или значению...">
        </div>

        <div class="asma-grid" id="asmaGrid">
            <!-- будет заполнено через JS -->
        </div>

        <div class="counter" id="counter"></div>
    </div>

    <script>
        // 99 имён Аллаха
        const asmaulHusna = [
            { num: 1, arabic: "الرَّحْمَٰنُ", name: "Ар-Рахман", meaning: "Милостивый", description: "Тот, Кто милостив ко всем творениям в этом мире." },
            { num: 2, arabic: "الرَّحِيمُ", name: "Ар-Рахим", meaning: "Милосердный", description: "Тот, Кто проявляет особую милость к верующим в следующей жизни." },
            { num: 3, arabic: "الْمَلِكُ", name: "Аль-Малик", meaning: "Царь", description: "Властелин всего сущего, Царь царей." },
            { num: 4, arabic: "الْقُدُّوسُ", name: "Аль-Куддус", meaning: "Святейший", description: "Свободный от любых недостатков, Пречистый." },
            { num: 5, arabic: "السَّلاَمُ", name: "Ас-Салям", meaning: "Дарующий мир", description: "Источник мира и безопасности." },
            { num: 6, arabic: "الْمُؤْمِنُ", name: "Аль-Му'мин", meaning: "Дарующий веру", description: "Тот, Кто дарует безопасность и веру." },
            { num: 7, arabic: "الْمُهَيْمِنُ", name: "Аль-Мухаймин", meaning: "Хранитель", description: "Надзирающий за всем сущим." },
            { num: 8, arabic: "الْعَزِيزُ", name: "Аль-Азиз", meaning: "Могущественный", description: "Обладающий абсолютным могуществом." },
            { num: 9, arabic: "الْجَبَّارُ", name: "Аль-Джаббар", meaning: "Всемогущий", description: "Тот, Чья воля непреклонна." },
            { num: 10, arabic: "الْمُتَكَبِّرُ", name: "Аль-Мутакаббир", meaning: "Превознесённый", description: "Превосходящий всё творение." },
            { num: 11, arabic: "الْخَالِقُ", name: "Аль-Халик", meaning: "Создатель", description: "Тот, Кто творит из небытия." },
            { num: 12, arabic: "الْبَارِئُ", name: "Аль-Бари", meaning: "Созидатель", description: "Тот, Кто создаёт с совершенной гармонией." },
            { num: 13, arabic: "الْمُصَوِّرُ", name: "Аль-Мусаввир", meaning: "Придающий форму", description: "Тот, Кто придаёт форму творениям." },
            { num: 14, arabic: "الْغَفَّارُ", name: "Аль-Гаффар", meaning: "Всепрощающий", description: "Тот, Кто постоянно прощает грехи." },
            { num: 15, arabic: "الْقَهَّارُ", name: "Аль-Каххар", meaning: "Властвующий", description: "Тот, Кто подчиняет Себе всё творение." },
            { num: 16, arabic: "الْوَهَّابُ", name: "Аль-Ваххаб", meaning: "Дарующий", description: "Щедро одаривающий Своих рабов." },
            { num: 17, arabic: "الرَّزَّاقُ", name: "Ар-Раззак", meaning: "Наделяющий уделом", description: "Тот, Кто дарует пропитание." },
            { num: 18, arabic: "الْفَتَّاحُ", name: "Аль-Фаттах", meaning: "Открывающий", description: "Тот, Кто открывает врата милости." },
            { num: 19, arabic: "الْعَلِيمُ", name: "Аль-Алим", meaning: "Всезнающий", description: "Обладающий абсолютным знанием." },
            { num: 20, arabic: "الْقَابِضُ", name: "Аль-Кабид", meaning: "Сжимающий", description: "Тот, Кто удерживает души и уделы." },
            { num: 21, arabic: "الْبَاسِطُ", name: "Аль-Басит", meaning: "Простирающий", description: "Тот, Кто расширяет удел." },
            { num: 22, arabic: "الْخَافِضُ", name: "Аль-Хафид", meaning: "Принижающий", description: "Тот, Кто принижает неверных." },
            { num: 23, arabic: "الرَّافِعُ", name: "Ар-Рафи", meaning: "Возвышающий", description: "Тот, Кто возвышает верующих." },
            { num: 24, arabic: "الْمُعِزُّ", name: "Аль-Муизз", meaning: "Возвеличивающий", description: "Дарующий величие и почёт." },
            { num: 25, arabic: "الْمُذِلُّ", name: "Аль-Музилль", meaning: "Унижающий", description: "Тот, Кто унижает по Своей воле." },
            { num: 26, arabic: "السَّمِيعُ", name: "Ас-Сами", meaning: "Всеслышащий", description: "Слышащий всё, даже самые тихие звуки." },
            { num: 27, arabic: "الْبَصِيرُ", name: "Аль-Басир", meaning: "Всевидящий", description: "Видящий всё явное и скрытое." },
            { num: 28, arabic: "الْحَكَمُ", name: "Аль-Хакам", meaning: "Мудрый Судья", description: "Выносящий справедливый приговор." },
            { num: 29, arabic: "الْعَدْلُ", name: "Аль-Адль", meaning: "Справедливый", description: "Тот, Кто поступает справедливо." },
            { num: 30, arabic: "اللَّطِيفُ", name: "Аль-Лятиф", meaning: "Проницательный", description: "Знающий о сокровенных тайнах." },
            { num: 31, arabic: "الْخَبِيرُ", name: "Аль-Хабир", meaning: "Сведущий", description: "Знающий о сути всех вещей." },
            { num: 32, arabic: "الْحَلِيمُ", name: "Аль-Халим", meaning: "Кроткий", description: "Тот, Кто не спешит с наказанием." },
            { num: 33, arabic: "الْعَظِيمُ", name: "Аль-Азим", meaning: "Великий", description: "Величие Которого не имеет границ." },
            { num: 34, arabic: "الْغَفُورُ", name: "Аль-Гафур", meaning: "Прощающий", description: "Тот, Кто много прощает." },
            { num: 35, arabic: "الشَّكُورُ", name: "Аш-Шакур", meaning: "Благодарный", description: "Воздающий за малые благодеяния." },
            { num: 36, arabic: "الْعَلِيُّ", name: "Аль-Алийй", meaning: "Высочайший", description: "Превосходящий всё творение." },
            { num: 37, arabic: "الْكَبِيرُ", name: "Аль-Кабир", meaning: "Величайший", description: "Тот, Чьё величие безгранично." },
            { num: 38, arabic: "الْحَفِيظُ", name: "Аль-Хафиз", meaning: "Хранитель", description: "Сохраняющий всё сущее." },
            { num: 39, arabic: "الْمُقِيتُ", name: "Аль-Мукит", meaning: "Поддерживающий", description: "Дарующий силу и пропитание." },
            { num: 40, arabic: "الْحَسِيبُ", name: "Аль-Хасиб", meaning: "Ведущий счёт", description: "Тот, Кто воздаёт по заслугам." },
            { num: 41, arabic: "الْجَلِيلُ", name: "Аль-Джалиль", meaning: "Величественный", description: "Обладающий абсолютным величием." },
            { num: 42, arabic: "الْكَرِيمُ", name: "Аль-Карим", meaning: "Щедрый", description: "Тот, Чья щедрость безгранична." },
            { num: 43, arabic: "الرَّقِيبُ", name: "Ар-Ракиб", meaning: "Наблюдающий", description: "Наблюдающий за всеми деяниями." },
            { num: 44, arabic: "الْمُجِيبُ", name: "Аль-Муджиб", meaning: "Отвечающий", description: "Тот, Кто отвечает на мольбы." },
            { num: 45, arabic: "الْوَاسِعُ", name: "Аль-Васи", meaning: "Всеобъемлющий", description: "Объемлющий всё Своей милостью." },
            { num: 46, arabic: "الْحَكِيمُ", name: "Аль-Хаким", meaning: "Мудрый", description: "Обладающий абсолютной мудростью." },
            { num: 47, arabic: "الْوَدُودُ", name: "Аль-Вадуд", meaning: "Любящий", description: "Любящий своих благочестивых рабов." },
            { num: 48, arabic: "الْمَجِيدُ", name: "Аль-Маджид", meaning: "Славный", description: "Обладающий высшей славой и честью." },
            { num: 49, arabic: "الْبَاعِثُ", name: "Аль-Баис", meaning: "Воскрешающий", description: "Воскрешающий творения после смерти." },
            { num: 50, arabic: "الشَّهِيدُ", name: "Аш-Шахид", meaning: "Свидетель", description: "Присутствующий везде и всегда." }
        ];

        // Добавим остальные имена для краткости, но для реального использования нужны все 99
        for (let i = 51; i <= 99; i++) {
            asmaulHusna.push({ num: i, arabic: `اسم ${i}`, name: `Имя ${i}`, meaning: "Значение", description: "Описание" });
        }

        let currentTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', currentTheme);

        function renderAsmaList(filter = '') {
            const grid = document.getElementById('asmaGrid');
            const searchTerm = filter.toLowerCase();
            const filtered = asmaulHusna.filter(a => 
                a.name.toLowerCase().includes(searchTerm) || 
                a.meaning.toLowerCase().includes(searchTerm) ||
                a.arabic.includes(searchTerm)
            );
            
            grid.innerHTML = filtered.map(a => `
                <div class="asma-card" data-num="${a.num}">
                    <div class="asma-number">${a.num}</div>
                    <div class="asma-arabic">${a.arabic}</div>
                    <div class="asma-name">${a.name}</div>
                    <div class="asma-meaning">${a.meaning}</div>
                </div>
            `).join('');
            
            document.getElementById('counter').innerHTML = `Показано ${filtered.length} из ${asmaulHusna.length} имён`;
            
            document.querySelectorAll('.asma-card').forEach(card => {
                card.addEventListener('click', () => {
                    const num = parseInt(card.dataset.num);
                    showDetail(num);
                });
            });
        }

        function showDetail(num) {
            const name = asmaulHusna.find(a => a.num === num);
            if (!name) return;
            
            const detailHtml = `
                <div class="asma-detail">
                    <div class="detail-arabic">${name.arabic}</div>
                    <div class="detail-name">${name.name}</div>
                    <div class="detail-meaning">${name.meaning}</div>
                    <div class="detail-description">${name.description}</div>
                </div>
            `;
            
            const existingDetail = document.querySelector('.asma-detail');
            if (existingDetail) existingDetail.remove();
            
            document.querySelector('.asma-container').insertAdjacentHTML('beforeend', detailHtml);
            document.querySelector('.asma-detail').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('asmaSearch').addEventListener('input', (e) => renderAsmaList(e.target.value));
        document.getElementById('themeToggleAsma').addEventListener('click', () => {
            const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.querySelector('#themeToggleAsma i');
            if (newTheme === 'dark') icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        });
        
        renderAsmaList();
        
        const icon = document.querySelector('#themeToggleAsma i');
        if (currentTheme === 'dark') icon.classList.replace('fa-moon', 'fa-sun');
    </script>
</body>
</html>
