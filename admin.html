<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Админ панель — Намаз Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #E0E0E0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #3D3D3D; flex-wrap: wrap; gap: 15px; }
        .back-btn { background: #3D3D3D; border: none; padding: 10px 20px; border-radius: 40px; color: #D4A373; cursor: pointer; text-decoration: none; font-weight: 500; }
        .send-notification-card { background: #2C2C2C; border-radius: 32px; padding: 24px; margin-bottom: 24px; }
        .notification-input { width: 100%; padding: 14px; background: #3D3D3D; border: none; border-radius: 24px; color: white; margin-bottom: 12px; font-family: inherit; }
        .notification-textarea { width: 100%; padding: 14px; background: #3D3D3D; border: none; border-radius: 24px; color: white; margin-bottom: 12px; font-family: inherit; resize: vertical; }
        .send-btn { background: #D4A373; border: none; padding: 12px 24px; border-radius: 40px; color: #1a1a1a; font-weight: 600; cursor: pointer; }
        .stats-card { background: #2C2C2C; border-radius: 32px; padding: 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .stat-number { font-size: 36px; font-weight: 700; color: #D4A373; }
        .users-table { background: #2C2C2C; border-radius: 32px; padding: 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #3D3D3D; }
        th { color: #D4A373; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-active { background: #4CAF50; color: white; }
        .status-banned { background: #e74c3c; color: white; }
        .action-btn { background: #3D3D3D; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; margin: 0 4px; font-size: 12px; }
        .delete-btn { color: #e74c3c; }
        .ban-btn { color: #FF9800; }
        .unban-btn { color: #4CAF50; }
        .loading { text-align: center; padding: 40px; color: #D4A373; }
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } .action-btn { padding: 4px 8px; font-size: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> На главную</a>
            <h1><i class="fas fa-chart-line"></i> Админ панель</h1>
            <div style="width: 100px;"></div>
        </div>

        <!-- Отправка уведомлений -->
        <div class="send-notification-card">
            <h3 style="margin-bottom: 16px;"><i class="fas fa-bell"></i> Отправить уведомление всем пользователям</h3>
            <input type="text" id="notifyTitle" class="notification-input" placeholder="Заголовок">
            <textarea id="notifyBody" class="notification-textarea" rows="3" placeholder="Текст уведомления"></textarea>
            <button id="sendNotificationBtn" class="send-btn"><i class="fas fa-paper-plane"></i> Отправить всем</button>
            <div id="notifyStatus" style="margin-top: 12px; font-size: 12px;"></div>
        </div>

        <!-- Статистика -->
        <div class="stats-card">
            <div><h3>👥 Всего пользователей</h3><div class="stat-number" id="totalUsers">0</div></div>
            <div><h3>🔒 Заблокировано</h3><div class="stat-number" id="bannedUsers">0</div></div>
            <div><h3>✅ Активных</h3><div class="stat-number" id="activeUsers">0</div></div>
        </div>

        <!-- Список пользователей -->
        <div class="users-table">
            <h3 style="margin-bottom: 16px;">📋 Управление пользователями</h3>
            <div id="usersList">Загрузка...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCsegOJYxJ6xGfYzyfAYpgV071ecqxLwZE",
            authDomain: "namaz-dagestan-app.firebaseapp.com",
            projectId: "namaz-dagestan-app",
            storageBucket: "namaz-dagestan-app.firebasestorage.app",
            messagingSenderId: "25438159159",
            appId: "1:25438159159:web:211bb662319c356ff8dab2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentAdminUid = null;
        
        // SERVER KEY из Firebase Console (твой ключ)
        const SERVER_KEY = 'BFyvW4Nm0ifuKtBgFxby7q_mZmyvlecwiU1Uz4xptDQEz0dffgIjphdvkBXtkEKLGW37M16BFAmABeeq9Fnqb2Y';
        
        async function checkAdmin() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return false;
            }
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            const userData = userDoc.data();
            if (userData?.role !== 'admin') {
                alert('⛔ Доступ запрещён. Только для администратора.');
                window.location.href = 'index.html';
                return false;
            }
            currentAdminUid = user.uid;
            return true;
        }
        
        async function loadUsers() {
            const querySnapshot = await getDocs(collection(db, 'users'));
            const users = [];
            querySnapshot.forEach(doc => {
                users.push({ id: doc.id, ...doc.data() });
            });
            return users;
        }
        
        // Отправка уведомления всем через FCM
        async function sendNotificationToAll(title, body) {
            const users = await loadUsers();
            const tokens = [];
            users.forEach(user => {
                if (user.fcmToken && !user.banned) {
                    tokens.push(user.fcmToken);
                }
            });
            
            if (tokens.length === 0) {
                alert('❌ Нет устройств для отправки уведомлений. Пользователи ещё не разрешили уведомления.');
                return false;
            }
            
            const message = {
                notification: {
                    title: title || 'Новое уведомление',
                    body: body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/3069/3069175.png',
                    click_action: 'https://sadusaduev2006-alt.github.io/namaz-time/'
                },
                webpush: {
                    headers: { Urgency: 'high' },
                    notification: {
                        vibrate: [200, 100, 200],
                        requireInteraction: true
                    }
                },
                tokens: tokens
            };
            
            try {
                const response = await fetch('https://fcm.googleapis.com/fcm/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `key=${SERVER_KEY}`
                    },
                    body: JSON.stringify(message)
                });
                
                const result = await response.json();
                console.log('Результат отправки:', result);
                
                if (result.success) {
                    alert(`✅ Уведомление отправлено ${result.success} пользователям!`);
                    return true;
                } else {
                    alert(`⚠️ Отправлено ${result.success}, ошибок: ${result.failure}`);
                    return false;
                }
            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('❌ Ошибка отправки уведомлений: ' + error.message);
                return false;
            }
        }
        
        async function banUser(userId) {
            await updateDoc(doc(db, 'users', userId), { banned: true, bannedAt: new Date().toISOString() });
            await loadAndRender();
        }
        
        async function unbanUser(userId) {
            await updateDoc(doc(db, 'users', userId), { banned: false });
            await loadAndRender();
        }
        
        async function deleteUser(userId, email) {
            if (!confirm(`Удалить пользователя ${email}? Это действие необратимо.`)) return;
            try {
                await deleteDoc(doc(db, 'users', userId));
                alert(`Пользователь ${email} удалён из базы.`);
                await loadAndRender();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }
        
        async function loadAndRender() {
            const users = await loadUsers();
            const total = users.length;
            const banned = users.filter(u => u.banned === true).length;
            const active = total - banned;
            
            document.getElementById('totalUsers').innerText = total;
            document.getElementById('bannedUsers').innerText = banned;
            document.getElementById('activeUsers').innerText = active;
            
            const container = document.getElementById('usersList');
            if (users.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">Нет пользователей</div>';
                return;
            }
            
            container.innerHTML = `
                <table>
                    <thead>
                        <tr><th>Имя</th><th>Email</th><th>Статус</th><th>Есть токен</th><th>Дата регистрации</th><th>Действия</th></tr>
                    </thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.name || u.email.split('@')[0]}</td>
                                <td>${u.email}</td>
                                <td><span class="status-badge ${u.banned ? 'status-banned' : 'status-active'}">${u.banned ? '🔒 Заблокирован' : '✅ Активен'}</span></td>
                                <td>${u.fcmToken ? '✅ Да' : '❌ Нет'}</td>
                                <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                                <td>
                                    ${!u.banned ? `<button class="action-btn ban-btn" onclick="window.banUser('${u.id}')"><i class="fas fa-lock"></i> Блок</button>` : `<button class="action-btn unban-btn" onclick="window.unbanUser('${u.id}')"><i class="fas fa-unlock"></i> Разблок</button>`}
                                    <button class="action-btn delete-btn" onclick="window.deleteUser('${u.id}', '${u.email}')"><i class="fas fa-trash"></i> Удалить</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            window.banUser = banUser;
            window.unbanUser = unbanUser;
            window.deleteUser = deleteUser;
        }
        
        document.getElementById('sendNotificationBtn').onclick = async () => {
            const title = document.getElementById('notifyTitle').value;
            const body = document.getElementById('notifyBody').value;
            if (!title && !body) {
                alert('Введите текст уведомления');
                return;
            }
            await sendNotificationToAll(title || 'Новое уведомление', body);
            document.getElementById('notifyTitle').value = '';
            document.getElementById('notifyBody').value = '';
        };
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            const isAdmin = await checkAdmin();
            if (isAdmin) await loadAndRender();
        });
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.style.background = savedTheme === 'dark' ? '#1a1a1a' : '#F4EFE6';
    </script>
</body>
</html>
