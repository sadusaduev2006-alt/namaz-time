<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Время намаза — Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069175.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Намаз Дагестан">
    <meta name="description" content="Точное время намаза в Махачкале и Дагестане. Коран, 99 имён Аллаха, Кибла, азан.">
    <meta name="keywords" content="намаз, Махачкала, Дагестан, Коран, Кибла, азан, время намаза">
    <!-- Предзагрузка критических ресурсов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://api.aladhan.com">
</head>
<body data-theme="light">
    <div class="container">
        <div class="prayer-card">
            <div class="header">
                <div class="header-top">
                    <div class="location-badge">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="citySelect">
                            <option value="42.9849,47.5046">Махачкала</option>
                            <option value="42.0569,48.2885">Дербент</option>
                            <option value="43.2500,46.5833">Хасавюрт</option>
                            <option value="42.8167,47.1167">Буйнакск</option>
                            <option value="42.5654,47.8634">Избербаш</option>
                            <option value="43.8485,46.7199">Кизляр</option>
                            <option value="42.8819,47.6372">Каспийск</option>
                        </select>
                    </div>
                    <div class="right-buttons">
                        <div class="dropdown">
                            <button id="menuToggle" class="menu-toggle">
                                <i class="fas fa-ellipsis-h"></i>
                            </button>
                            <div id="dropdownMenu" class="dropdown-content">
                                <a href="surah-fatiha.html">
                                    <i class="fas fa-star-and-crescent"></i> Сура Аль-Фатиха
                                </a>
                                <a href="quran.html">
                                    <i class="fas fa-book-quran"></i> Священный Коран
                                </a>
                                <a href="asmaul-husna.html">
                                    <i class="fas fa-heart"></i> 99 имён Аллаха
                                </a>
                                <a href="#" id="settingsLink">
                                <i class="fas fa-sliders-h"></i> Настройки времени намаза
                                </a>
                            </div>
                        </div>
                        <button id="themeToggle" class="theme-toggle">
                            <i class="fas fa-moon"></i>
                        </button>
                    </div>
                </div>
                <h1>🕌 Время намаза</h1>
                <p class="date" id="currentDate">--</p>
                <p class="gregorian" id="gregorianDate">--</p>
            </div>

            <div class="prayer-grid">
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-cloud-moon"></i><span class="prayer-name">Фаджр</span></div><span class="prayer-time" id="fajr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-sun"></i><span class="prayer-name">Шурук</span></div><span class="prayer-time" id="sunrise">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-sun"></i><span class="prayer-name">Зухр</span></div><span class="prayer-time" id="dhuhr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-clock"></i><span class="prayer-name">Аср</span></div><span class="prayer-time" id="asr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-moon"></i><span class="prayer-name">Магриб</span></div><span class="prayer-time" id="maghrib">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-star-of-life"></i><span class="prayer-name">Иша</span></div><span class="prayer-time" id="isha">--:--</span></div>
            </div>

            <div class="next-prayer-card">
                <div class="next-prayer-label"><i class="fas fa-bell"></i><span>Следующий намаз</span></div>
                <div class="next-prayer-info"><span class="next-prayer-name" id="nextPrayerName">--</span><span class="next-prayer-time" id="nextPrayerTime">--:--</span></div>
                <div class="countdown"><i class="fas fa-hourglass-half"></i><span id="countdownText">--</span></div>
            </div>

            <div class="qibla-card">
                <div class="qibla-header"><i class="fas fa-kaaba"></i><span>Направление на Киблу</span></div>
                <div class="compass-container">
                    <div class="compass"><div class="needle" id="needle"><div class="needle-top"></div><div class="needle-bottom"></div></div><div class="compass-mark">N</div></div>
                    <div class="qibla-degree" id="qiblaDegree">--°</div>
                    <div id="compassHint" style="font-size:14px;margin-top:10px;">📍 Нажмите кнопку ниже</div>
                    <button id="requestLocation" class="location-btn"><i class="fas fa-location-arrow"></i> Определить направление</button>
                </div>
            </div>

            <div class="footer-note">
                <p><i class="far fa-clock"></i> Обновлено: <span id="updateTime">сегодня</span></p>
                <p class="method"><i class="fas fa-calculator"></i> Метод: MWL (угол 18°)</p>
            </div>
        </div>
    </div>

    <audio id="azanAudio" preload="none"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <audio id="notificationSound" preload="none"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    
    <script src="script.js" defer></script>
</body>
</html>
