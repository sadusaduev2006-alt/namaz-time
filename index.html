<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Время намаза — Махачкала</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069175.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Намаз Махачкала">
</head>
<body>
    <div class="container">
        <div class="prayer-card">
            <div class="header">
                <div class="location-badge">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Махачкала, Дагестан</span>
                </div>
                <h1>🕌 Время намаза</h1>
                <p class="date" id="currentDate">--</p>
                <p class="gregorian" id="gregorianDate">--</p>
            </div>

            <div class="prayer-grid">
                <div class="prayer-item">
                    <div class="prayer-info">
                        <i class="fas fa-cloud-moon"></i>
                        <span class="prayer-name">Фаджр</span>
                    </div>
                    <span class="prayer-time" id="fajr">--:--</span>
                </div>
                <div class="prayer-item">
                    <div class="prayer-info">
                        <i class="fas fa-sun"></i>
                        <span class="prayer-name">Шурук</span>
                    </div>
                    <span class="prayer-time" id="sunrise">--:--</span>
                </div>
                <div class="prayer-item">
                    <div class="prayer-info">
                        <i class="fas fa-sun"></i>
                        <span class="prayer-name">Зухр</span>
                    </div>
                    <span class="prayer-time" id="dhuhr">--:--</span>
                </div>
                <div class="prayer-item">
                    <div class="prayer-info">
                        <i class="fas fa-clock"></i>
                        <span class="prayer-name">Аср</span>
                    </div>
                    <span class="prayer-time" id="asr">--:--</span>
                </div>
                <div class="prayer-item">
                    <div class="prayer-info">
                        <i class="fas fa-moon"></i>
                        <span class="prayer-name">Магриб</span>
                    </div>
                    <span class="prayer-time" id="maghrib">--:--</span>
                </div>
                <div class="prayer-item">
                    <div class="prayer-info">
                        <i class="fas fa-star-of-life"></i>
                        <span class="prayer-name">Иша</span>
                    </div>
                    <span class="prayer-time" id="isha">--:--</span>
                </div>
            </div>

            <div class="next-prayer-card" id="nextPrayerCard">
                <div class="next-prayer-label">
                    <i class="fas fa-bell"></i>
                    <span>Следующий намаз</span>
                </div>
                <div class="next-prayer-info">
                    <span class="next-prayer-name" id="nextPrayerName">--</span>
                    <span class="next-prayer-time" id="nextPrayerTime">--:--</span>
                </div>
                <div class="countdown" id="countdown">
                    <i class="fas fa-hourglass-half"></i>
                    <span id="countdownText">--</span>
                </div>
            </div>

            <div class="footer-note">
                <p><i class="far fa-clock"></i> Обновлено: <span id="updateTime">сегодня</span></p>
                <p class="method"><i class="fas fa-calculator"></i> Метод: ДУМ РФ</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
