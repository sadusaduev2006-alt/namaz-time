<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Коран — Намаз Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="quran.css">
</head>
<body data-theme="light">
    <div class="quran-container">
        <!-- Верхняя панель -->
        <div class="quran-header">
            <button id="backToMain" class="header-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>📖 القرآن الكريم</h2>
            <div class="header-right">
                <button id="themeToggleQuran" class="header-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="menuToggleBtn" class="header-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Основная книга -->
        <div class="book-container">
            <div class="book-page" id="quranPage">
                <div class="surah-header" id="surahHeader">
                    <h1 id="surahName">سورة الفاتحة</h1>
                    <p id="surahInfo">مكية • 7 آيات</p>
                </div>
                <div class="quran-text" id="quranText">
                    <div class="loading">جاري التحميل...</div>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="quran-nav">
            <button id="prevSurah" class="nav-btn">
                <i class="fas fa-chevron-right"></i> السابقة
            </button>
            <div class="surah-counter">
                <span id="currentSurahNum">1</span> / <span id="totalSurahs">114</span>
            </div>
            <button id="nextSurah" class="nav-btn">
                التالية <i class="fas fa-chevron-left"></i>
            </button>
        </div>
    </div>

    <!-- Выезжающее меню со списком сур -->
    <div id="surahDrawer" class="surah-drawer">
        <div class="drawer-header">
            <h3><i class="fas fa-list"></i> فهرس السور</h3>
            <button id="closeDrawerBtn" class="close-drawer-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="surahSearch" placeholder="ابحث عن سورة...">
        </div>
        <div class="surah-list" id="surahList">
            <div class="loading-surahs">جاري تحميل السور...</div>
        </div>
    </div>

    <div id="drawerOverlay" class="drawer-overlay"></div>

    <script src="quran.js"></script>
</body>
</html>
