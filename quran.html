    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .quran-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        
        .quran-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .back-btn {
            background: var(--accent-light);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            cursor: pointer;
            color: var(--accent);
            font-size: 20px;
            transition: transform 0.2s;
        }
        
        .back-btn:hover {
            transform: scale(1.05);
        }
        
        .quran-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .empty-space {
            width: 44px;
        }
        
        /* Навигация */
        .surah-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: var(--accent-light);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-family: inherit;
            font-weight: 500;
            font-size: 14px;
            color: var(--accent);
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-btn:active {
            transform: scale(0.97);
        }
        
        .surah-select {
            flex: 1;
            background: var(--accent-light);
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            text-align: center;
        }
        
        /* Контент суры */
        .surah-content {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: var(--shadow);
        }
        
        .surah-name {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }
        
        .surah-basmala {
            text-align: center;
            font-size: 22px;
            font-family: 'Amiri', serif;
            color: var(--accent);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            opacity: 0.8;
        }
        
        .ayahs-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .ayah-line {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .arabic-ayah {
            font-size: 24px;
            line-height: 1.7;
            text-align: right;
            font-family: 'Amiri', 'Times New Roman', serif;
            color: var(--text-primary);
            direction: rtl;
            flex: 1;
        }
        
        .ayah-number-badge {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-light);
            width: 28px;
            height: 28px;
            border-radius: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .loading-placeholder {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        /* Кэшированная сура */
        .surah-content.cached {
            animation: none;
        }
        
        @media (max-width: 560px) {
            .quran-page {
                padding: 16px;
            }
            .surah-content {
                padding: 24px 16px;
            }
            .arabic-ayah {
                font-size: 20px;
                line-height: 1.6;
            }
            .surah-name {
                font-size: 22px;
            }
            .surah-basmala {
                font-size: 18px;
            }
            .nav-btn {
                padding: 8px 14px;
                font-size: 12px;
            }
        }
        
        @media (min-width: 1025px) {
            .arabic-ayah {
                font-size: 28px;
            }
            .surah-content {
                padding: 40px 32px;
            }
        }
    </style>
</head>

    <script>
        // Кэш для хранения загруженных сур
        const surahCache = {};
        let currentSurah = 1;
        const totalSurahs = 114;
        
        // Названия сур для отображения
        const surahNames = {
            1: "Аль-Фатиха", 2: "Аль-Бакара", 3: "Аль-Имран", 4: "Ан-Ниса", 5: "Аль-Маида",
            6: "Аль-Анам", 7: "Аль-Араф", 8: "Аль-Анфаль", 9: "Ат-Тавба", 10: "Юнус",
            11: "Худ", 12: "Юсуф", 13: "Ар-Рад", 14: "Ибрахим", 15: "Аль-Хиджр", 16: "Ан-Нахль",
            17: "Аль-Исра", 18: "Аль-Кахф", 19: "Марьям", 20: "Та Ха", 21: "Аль-Анбия", 22: "Аль-Хаджж",
            23: "Аль-Муминун", 24: "Ан-Нур", 25: "Аль-Фуркан", 26: "Аш-Шуара", 27: "Ан-Намль", 28: "Аль-Касас",
            29: "Аль-Анкабут", 30: "Ар-Рум", 31: "Лукман", 32: "Ас-Саджда", 33: "Аль-Ахзаб", 34: "Саба",
            35: "Фатир", 36: "Йа Син", 37: "Ас-Саффат", 38: "Сад", 39: "Аз-Зумар", 40: "Гафир",
            41: "Фуссилят", 42: "Аш-Шура", 43: "Аз-Зухруф", 44: "Ад-Духан", 45: "Аль-Джасия", 46: "Аль-Ахкаф",
            47: "Мухаммад", 48: "Аль-Фатх", 49: "Аль-Худжурат", 50: "Каф", 51: "Аз-Зарият", 52: "Ат-Тур",
            53: "Ан-Наджм", 54: "Аль-Камар", 55: "Ар-Рахман", 56: "Аль-Вакиа", 57: "Аль-Хадид", 58: "Аль-Муджадила",
            59: "Аль-Хашр", 60: "Аль-Мумтахана", 61: "Ас-Сафф", 62: "Аль-Джумуа", 63: "Аль-Мунафикун", 64: "Ат-Тагабун",
            65: "Ат-Таляк", 66: "Ат-Тахрим", 67: "Аль-Мульк", 68: "Аль-Калям", 69: "Аль-Хакка", 70: "Аль-Мааридж",
            71: "Нух", 72: "Аль-Джинн", 73: "Аль-Муззаммиль", 74: "Аль-Муддассир", 75: "Аль-Кияма", 76: "Аль-Инсан",
            77: "Аль-Мурсалят", 78: "Ан-Наба", 79: "Ан-Назиат", 80: "Абаса", 81: "Ат-Таквир", 82: "Аль-Инфитар",
            83: "Аль-Мутаффифин", 84: "Аль-Иншикак", 85: "Аль-Бурудж", 86: "Ат-Тарик", 87: "Аль-Аля", 88: "Аль-Гашия",
            89: "Аль-Фаджр", 90: "Аль-Балад", 91: "Аш-Шамс", 92: "Аль-Ляйль", 93: "Ад-Духа", 94: "Аш-Шарх",
            95: "Ат-Тин", 96: "Аль-Алак", 97: "Аль-Кадр", 98: "Аль-Баййина", 99: "Аз-Зальзаля", 100: "Аль-Адият",
            101: "Аль-Кариа", 102: "Ат-Такасур", 103: "Аль-Аср", 104: "Аль-Хумаза", 105: "Аль-Филь", 106: "Курайш",
            107: "Аль-Маун", 108: "Аль-Каусар", 109: "Аль-Кафирун", 110: "Ан-Наср", 111: "Аль-Масад", 112: "Аль-Ихляс",
            113: "Аль-Фалак", 114: "Ан-Нас"
        };

        // Отображение суры из кэша или загрузка
        async function displaySurah(surahNumber) {
            const container = document.getElementById('surahContent');
            
            // Если сура уже в кэше — показываем мгновенно
            if (surahCache[surahNumber]) {
                container.innerHTML = surahCache[surahNumber];
                return;
            }
            
            // Показываем индикатор загрузки
            container.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
            
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/editions/ar.uthmani`);
                const data = await response.json();
                
                if (data.code === 200) {
                    const surah = data.data[0];
                    let html = `
                        <div class="surah-name">${surahNumber}. ${surahNames[surahNumber]}</div>
                        <div class="surah-basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                        <div class="ayahs-container">
                    `;
                    
                    surah.ayahs.forEach(ayah => {
                        html += `
                            <div class="ayah-line">
                                <span class="arabic-ayah">${ayah.text}</span>
                                <span class="ayah-number-badge">${ayah.numberInSurah}</span>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                    
                    // Сохраняем в кэш
                    surahCache[surahNumber] = html;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="loading-placeholder">Ошибка загрузки</div>';
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loading-placeholder">Ошибка сети. Проверьте подключение.</div>';
            }
        }

        // Обновление выбранной суры
        function setSurah(surahNumber) {
            currentSurah = surahNumber;
            document.getElementById('surahSelect').value = surahNumber;
            displaySurah(currentSurah);
        }

        // Переключение на следующую суру
        function nextSurah() {
            let next = currentSurah + 1;
            if (next > totalSurahs) next = 1;
            setSurah(next);
        }

        // Переключение на предыдущую суру
        function prevSurah() {
            let prev = currentSurah - 1;
            if (prev < 1) prev = totalSurahs;
            setSurah(prev);
        }

        // Назначение обработчиков
        document.getElementById('prevSurahBtn').onclick = prevSurah;
        document.getElementById('nextSurahBtn').onclick = nextSurah;
        document.getElementById('surahSelect').onchange = (e) => {
            setSurah(parseInt(e.target.value));
        };

        // Тёмная тема
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        // Загрузка первой суры
        setSurah(1);
    </script>
