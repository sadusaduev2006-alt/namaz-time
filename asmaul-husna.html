            --text: #2C2A29;
            --accent: #B67B4A;

            --border: rgba(210, 180, 140, 0.2);

        }

        body[data-theme="dark"] {
            --bg: #1a1a1a;
            --card-bg: #2C2C2C;
            --text: #E0E0E0;
            --accent: #D4A373;
            --accent-light: #3D3D3D;
            --border: rgba(200, 180, 140, 0.2);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        .asma-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .asma-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            background: var(--accent-light);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            cursor: pointer;
            color: var(--accent);
            font-size: 20px;
            transition: transform 0.2s;
        }

        .asma-header h1 {
            font-size: 22px;
            color: var(--accent);
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            background: var(--accent-light);
            border: none;
            padding: 14px 18px;
            border-radius: 40px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text);
        }

        .search-box input:focus {
            outline: none;
        }

        .asma-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .asma-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .asma-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .asma-number {
            font-size: 10px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .asma-arabic {
            font-family: 'Amiri', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .asma-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .asma-meaning {
            font-size: 10px;
            opacity: 0.7;
        }

        .asma-detail {
            margin-top: 24px;
            background: var(--accent-light);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
        }

        .detail-arabic {
            font-family: 'Amiri', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;

            margin-bottom: 6px;

            font-size: 16px;

            line-height: 1.5;

        }

        .counter {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--accent);

            }

            }

            { num: 90, arabic: "الْمَانِعُ", name: "Аль-Мани", meaning: "Запрещающий", description: "Запрещающий то, что желает." },
            { num: 91, arabic: "الضَّارُ", name: "Ад-Дарр", meaning: "Причиняющий вред", description: "Создающий то, что считают вредом." },
            { num: 92, arabic: "النَّافِعُ", name: "Ан-Нафи", meaning: "Приносящий пользу", description: "Дарующий пользу кому пожелает." },
            { num: 93, arabic: "النُّورُ", name: "Ан-Нур", meaning: "Свет", description: "Освещающий небеса и землю." },
            { num: 94, arabic: "الْهَادِي", name: "Аль-Хади", meaning: "Ведущий прямым путём", description: "Наставляющий на истинный путь." },
            { num: 95, arabic: "الْبَدِيعُ", name: "Аль-Бади", meaning: "Творец", description: "Создающий из ничего без примера." },
            { num: 96, arabic: "الْبَاقِي", name: "Аль-Баки", meaning: "Вечный", description: "Тот, Кто пребывает вечно." },
            { num: 97, arabic: "الْوَارِثُ", name: "Аль-Варис", meaning: "Наследник", description: "Тот, Кому всё возвращается." },
            { num: 98, arabic: "الرَّشِيدُ", name: "Ар-Рашид", meaning: "Направляющий", description: "Направляющий на правильный путь." },
            { num: 99, arabic: "الصَّبُورُ", name: "Ас-Сабур", meaning: "Терпеливый", description: "Не спешащий с наказанием." }
        ];

        let currentTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', currentTheme);

        function renderList(filter = '') {
            const grid = document.getElementById('asmaGrid');
            const term = filter.toLowerCase();
            const filtered = asmaulHusna.filter(a => 
                a.name.toLowerCase().includes(term) || 
                a.meaning.toLowerCase().includes(term) ||
                a.arabic.includes(term)
            );
            
            grid.innerHTML = filtered.map(a => `
                <div class="asma-card" data-num="${a.num}">
                    <div class="asma-number">${a.num}</div>
                    <div class="asma-arabic">${a.arabic}</div>
                    <div class="asma-name">${a.name}</div>
                    <div class="asma-meaning">${a.meaning}</div>
                </div>
            `).join('');
            
            document.getElementById('counter').innerHTML = `Показано ${filtered.length} из ${asmaulHusna.length} имён`;
            
            document.querySelectorAll('.asma-card').forEach(card => {
                card.addEventListener('click', () => {
                    const num = parseInt(card.dataset.num);
                    showDetail(num);
                });
            });
        }

        function showDetail(num) {
            const name = asmaulHusna.find(a => a.num === num);
            if (!name) return;
            
            const detailHtml = `
                <div class="asma-detail">
                    <div class="detail-arabic">${name.arabic}</div>
                    <div class="detail-name">${name.name}</div>
                    <div class="detail-meaning">${name.meaning}</div>
                    <div class="detail-description">${name.description}</div>
                </div>
            `;
            
            const existing = document.querySelector('.asma-detail');
            if (existing) existing.remove();
            document.querySelector('.asma-container').insertAdjacentHTML('beforeend', detailHtml);
            document.querySelector('.asma-detail').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('asmaSearch').addEventListener('input', (e) => renderList(e.target.value));
        document.getElementById('themeToggleAsma').addEventListener('click', () => {
            const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const icon = document.querySelector('#themeToggleAsma i');
            if (newTheme === 'dark') icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        });
        
        renderList();
        
        const icon = document.querySelector('#themeToggleAsma i');
        if (currentTheme === 'dark') icon.classList.replace('fa-moon', 'fa-sun');
    </script>
</body>
</html>
