<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Намаз Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069175.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Намаз Дагестан">
    <meta name="theme-color" content="#1a1a1a">
</head>
<body data-theme="dark">
    <div class="container">
        <div class="prayer-card">
            <div class="header">
                <div class="header-top">
                    <!-- ПРОФИЛЬ (СЛЕВА) -->
                    <div class="left-buttons">
                        <button id="profileBtn" class="icon-btn">
                            <i class="fas fa-user-circle"></i>
                        </button>
                    </div>
                    
                    <!-- ВЫБОР ГОРОДА (ЦЕНТР) -->
                    <div class="center-controls">
                        <div class="location-badge">
                            <i class="fas fa-map-marker-alt"></i>
                            <select id="citySelect">
                                <option value="Махачкала">Махачкала</option>
                            </select>
                        </div>
                    </div>

                    <!-- МЕНЮ (СПРАВА) -->
                    <div class="right-buttons">
                        <div class="dropdown">
                            <button id="menuToggle" class="icon-btn">
                                <i class="fas fa-ellipsis-h"></i>
                            </button>
                            <div id="dropdownMenu" class="dropdown-content">
                                <a href="#" id="aboutMenuItem">📖 О приложении</a>
                                <a href="#" id="telegramSubscribeBtn">📨 Подписаться на Telegram</a>
                            </div>
                        </div>
                    </div>
                </div>
                <h1>🕌 Время намаза</h1>
            </div>

            <div class="prayer-grid">
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-cloud-moon"></i><span class="prayer-name">Фаджр</span></div><span class="prayer-time" id="fajr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-sun"></i><span class="prayer-name">Шурук</span></div><span class="prayer-time" id="sunrise">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-sun"></i><span class="prayer-name">Зухр</span></div><span class="prayer-time" id="dhuhr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-clock"></i><span class="prayer-name">Аср</span></div><span class="prayer-time" id="asr">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-moon"></i><span class="prayer-name">Магриб</span></div><span class="prayer-time" id="maghrib">--:--</span></div>
                <div class="prayer-item"><div class="prayer-info"><i class="fas fa-star-of-life"></i><span class="prayer-name">Иша</span></div><span class="prayer-time" id="isha">--:--</span></div>
            </div>

            <div class="footer-note">
                <p><i class="far fa-clock"></i> Обновлено: <span id="updateTime">сегодня</span></p>
            </div>
        </div>
    </div>

    <!-- ПЛАВАЮЩИЕ КНОПКИ -->
    <button id="floatingCompassBtn" class="floating-compass-btn">
        <i class="fas fa-compass"></i>
    </button>
    <a href="quran.html" id="floatingQuranBtn" class="floating-quran-btn">
        <i class="fas fa-book-quran"></i> Коран
    </a>

    <!-- ПРОФИЛЬ (ПОЛНОЭКРАННЫЙ) -->
    <div id="fullscreenProfile" class="fullscreen-profile">
        <div class="profile-full-header">
            <button id="closeProfile" class="close-profile">&times;</button>
            <h2>Настройки</h2>
            <div style="width: 44px;"></div>
        </div>
        <div class="profile-tabs">
            <button class="profile-tab active" data-profile-tab="notifications">🔔 Уведомления</button>
            <button class="profile-tab" data-profile-tab="appearance">🎨 Оформление</button>
        </div>
        <div class="profile-content">
            <!-- Уведомления -->
            <div id="profile-tab-notifications" class="profile-pane active">
                <div class="settings-group">
                    <div class="settings-item">
                        <div class="settings-info">
                            <i class="fas fa-bell"></i>
                            <div><h4>Уведомления о намазах</h4><p>Напоминания за выбранное время</p></div>
                        </div>
                        <label class="switch"><input type="checkbox" id="notificationsToggle"><span class="slider"></span></label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-info">
                            <i class="fas fa-clock"></i>
                            <div><h4>Напоминать за</h4></div>
                        </div>
                        <select id="notificationTimeSelect" class="settings-select">
                            <option value="5">5 минут</option>
                            <option value="10">10 минут</option>
                            <option value="15">15 минут</option>
                            <option value="30">30 минут</option>
                        </select>
                    </div>
                </div>
            </div>
            <!-- Оформление -->
            <div id="profile-tab-appearance" class="profile-pane">
                <div class="settings-group">
                    <div class="settings-item">
                        <div class="settings-info"><i class="fas fa-moon"></i><div><h4>Тёмная тема</h4></div></div>
                        <label class="switch"><input type="checkbox" id="profileDarkModeToggle" checked><span class="slider"></span></label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- КОМПАС -->
    <div id="fullscreenCompass" class="fullscreen-compass">
        <div class="compass-full-header">
            <button id="closeFullscreenCompass" class="close-fullscreen">&times;</button>
            <h3>🧭 Направление на Киблу</h3>
            <div style="width: 44px;"></div>
        </div>
        <div class="compass-full-body">
            <div class="compass-full">
                <div class="needle-full" id="needleFull">
                    <div class="needle-top-full"></div>
                    <div class="needle-bottom-full"></div>
                </div>
                <div class="compass-mark-full">N</div>
                <div class="kaaba-icon-full"><i class="fas fa-kaaba"></i></div>
            </div>
            <div class="qibla-degree-full" id="qiblaDegreeFull">--°</div>
            <div id="compassHintFull" class="compass-hint-full">📍 Нажмите кнопку ниже</div>
            <button id="startCompassFull" class="start-compass-btn">🚀 ЗАПУСТИТЬ КОМПАС</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
