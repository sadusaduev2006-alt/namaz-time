<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Админ панель — Намаз Дагестан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #E0E0E0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3D3D3D;
        }
        .back-btn {
            background: #3D3D3D;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #D4A373;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        h1 {
            color: #D4A373;
            font-size: 24px;
        }
        .stats-card {
            background: #2C2C2C;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-number {
            font-size: 48px;
            font-weight: 700;
            color: #D4A373;
        }
        .users-table {
            background: #2C2C2C;
            border-radius: 32px;
            padding: 24px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #3D3D3D;
        }
        th {
            color: #D4A373;
            font-weight: 600;
        }
        .role-badge {
            background: #D4A373;
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .role-badge.admin {
            background: #e74c3c;
            color: white;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #D4A373;
        }
        @media (max-width: 560px) {
            th, td { font-size: 12px; padding: 8px; }
            .stats-card { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> На главную</a>
            <h1><i class="fas fa-chart-line"></i> Админ панель</h1>
            <div style="width: 100px;"></div>
        </div>
        
        <div id="adminContent" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Проверка доступа...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCsegOJYxJ6xGfYzyfAYpgV071ecqxLwZE",
            authDomain: "namaz-dagestan-app.firebaseapp.com",
            projectId: "namaz-dagestan-app",
            storageBucket: "namaz-dagestan-app.firebasestorage.app",
            messagingSenderId: "25438159159",
            appId: "1:25438159159:web:211bb662319c356ff8dab2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        async function loadUsers() {
            const querySnapshot = await getDocs(collection(db, 'users'));
            const users = [];
            querySnapshot.forEach(doc => {
                users.push({ id: doc.id, ...doc.data() });
            });
            return users;
        }
        
        function renderAdminPanel(users) {
            const container = document.getElementById('adminContent');
            const totalUsers = users.length;
            const admins = users.filter(u => u.role === 'admin').length;
            
            container.innerHTML = `
                <div class="stats-card">
                    <div>
                        <h3>👥 Всего пользователей</h3>
                        <div class="stat-number">${totalUsers}</div>
                    </div>
                    <div>
                        <h3>👑 Администраторов</h3>
                        <div class="stat-number">${admins}</div>
                    </div>
                    <div>
                        <h3>📅 Зарегистрировано за всё время</h3>
                        <div class="stat-number">${totalUsers}</div>
                    </div>
                </div>
                
                <div class="users-table">
                    <h3 style="margin-bottom: 16px;">📋 Список пользователей</h3>
                    <table>
                        <thead>
                            <tr><th>Имя</th><th>Email</th><th>Роль</th><th>Дата регистрации</th><th>Email подтверждён</th></tr>
                        </thead>
                        <tbody>
                            ${users.map(u => `
                                <tr>
                                    <td>${u.name || u.email.split('@')[0]}</td>
                                    <td>${u.email}</td>
                                    <td><span class="role-badge ${u.role === 'admin' ? 'admin' : ''}">${u.role || 'user'}</span></td>
                                    <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                                    <td>${u.emailVerified ? '✅ Да' : '❌ Нет'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function showAccessDenied() {
            document.getElementById('adminContent').innerHTML = `
                <div class="stats-card" style="justify-content: center; background: #3D3D3D;">
                    <div style="text-align: center;">
                        <i class="fas fa-lock" style="font-size: 48px; color: #e74c3c; margin-bottom: 16px;"></i>
                        <h2>⛔ Доступ запрещён</h2>
                        <p>У вас нет прав администратора.</p>
                        <a href="index.html" class="back-btn" style="display: inline-block; margin-top: 20px;">Вернуться на главную</a>
                    </div>
                </div>
            `;
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.data();
                
                if (userData?.role !== 'admin') {
                    showAccessDenied();
                    return;
                }
                
                const users = await loadUsers();
                renderAdminPanel(users);
            } catch (error) {
                console.error(error);
                showAccessDenied();
            }
        });
        
        // Тёмная тема
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'light') {
            document.body.style.background = '#F4EFE6';
            document.body.style.color = '#2C2A29';
        }
    </script>
</body>
</html>
